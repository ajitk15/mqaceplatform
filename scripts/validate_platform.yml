---
###############################################################################
# validate_platform.yml — platform health validation rendered to a static
# HTML dashboard served over HTTP.
#
#   MQ servers (all_mq_servers):  MQ version · ALL queue managers · MQ Web (link)
#   ACE servers (mq_ace):         ACE installation · node name · ACE Web (link)
#
# Output: /home/ec2-user/validate-www/index.html  (served on port 8090)
###############################################################################

- name: Collect IBM MQ status from all MQ servers
  hosts: all_mq_servers
  become: true
  gather_facts: false
  vars_files:
    - mq_ace_install_vars.yml

  tasks:
    - name: Get public IP (IMDSv2)
      ansible.builtin.shell: |
        TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 120")
        curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4
      register: c_pubip
      changed_when: false
      failed_when: false

    - name: MQ installed version (dspmqver)
      ansible.builtin.command: "{{ mq_install_dir }}/bin/dspmqver -b -f 2"
      register: c_mq_ver
      changed_when: false
      failed_when: false

    - name: List ALL queue managers (name|status)
      ansible.builtin.shell: |
        {{ mq_install_dir }}/bin/dspmq | sed -n 's/QMNAME(\([^)]*\)).*STATUS(\([^)]*\)).*/\1|\2/p'
      become_user: mqm
      register: c_qmgrs
      changed_when: false
      failed_when: false

    - name: MQ Web console status (dspmqweb)
      ansible.builtin.command: "{{ mq_install_dir }}/bin/dspmqweb status"
      become_user: mqm
      register: c_mq_web
      changed_when: false
      failed_when: false

    - name: Record MQ facts
      ansible.builtin.set_fact:
        public_ip: "{{ c_pubip.stdout | default('') | trim }}"
        mq_installed: "{{ ((c_mq_ver.rc | default(1)) == 0 and '9.' in (c_mq_ver.stdout | default(''))) | bool }}"
        mq_version: "{{ (c_mq_ver.stdout | default('')) | trim | regex_replace('^Version:\\s*', '') }}"
        qmgr_lines: "{{ c_qmgrs.stdout_lines | default([]) }}"
        mq_web_ok: "{{ ('running' in (c_mq_web.stdout | default('') | lower)) | bool }}"
        is_ace: false

- name: Collect IBM ACE status from MQ+ACE servers
  hosts: mq_ace
  become: true
  gather_facts: false
  vars_files:
    - mq_ace_install_vars.yml
  vars:
    node_name: "{{ ace_node_map[inventory_hostname] | default('NODE') }}"

  tasks:
    - name: ACE installed (mqsiservice present)
      ansible.builtin.shell: "ls {{ ace_install_parent }}/ace-*/server/bin/mqsiservice 2>/dev/null | head -1"
      register: c_ace_install
      changed_when: false
      failed_when: false

    - name: ACE integration node active
      ansible.builtin.command: "systemctl is-active ace-{{ node_name }}"
      register: c_ace_node
      changed_when: false
      failed_when: false

    - name: ACE webui port listening
      ansible.builtin.shell: "ss -ltn | grep -q ':{{ ace_web_port }} '"
      register: c_ace_web
      changed_when: false
      failed_when: false

    - name: Record ACE facts
      ansible.builtin.set_fact:
        is_ace: true
        ace_node_name: "{{ node_name }}"
        ace_web_port: "{{ ace_web_port }}"
        ace_installed: "{{ (c_ace_install.rc == 0 and (c_ace_install.stdout | length) > 0) | bool }}"
        ace_version_str: "{{ c_ace_install.stdout | regex_search('ace-([0-9][0-9.]+)', '\\1') | default('', true) }}"
        ace_node_ok: "{{ ((c_ace_node.stdout | trim) == 'active') | bool }}"
        ace_web_ok: "{{ (c_ace_web.rc == 0) | bool }}"

- name: Render HTML dashboard on the control node
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    dashboard_dir: "/home/ec2-user/validate-www"
    mq_web_port: 9443

  tasks:
    - name: Control node — public IP (IMDSv2)
      ansible.builtin.shell: |
        TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 120")
        curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4
      register: ctl_pubip
      changed_when: false
      failed_when: false

    - name: Control node — ansible version (first line)
      ansible.builtin.shell: "ansible --version 2>/dev/null | head -1"
      register: ctl_ansible
      changed_when: false
      failed_when: false

    - name: Control node — cron jobs and their last run time
      ansible.builtin.shell: |
        emit() {   # name | schedule | last-run
          name="$1"; file="$2"; logpath="$3"
          sched="(not configured)"
          [ -f "$file" ] && sched="$(grep -hoE '^[0-9*,/ ]+' "$file" | head -1 | xargs)"
          last="never"
          [ -e "$logpath" ] && last="$(date -r "$logpath" '+%Y-%m-%d %H:%M:%S %Z')"
          echo "$name|$sched|$last"
        }
        emit "Validation dashboard (validate_platform.yml)" /etc/cron.d/mq-ace-validate /home/ec2-user/validate-www/index.html
        dlog="$(ls -1t /var/log/mqace-dumps/run-*.log 2>/dev/null | head -1)"
        emit "Config dumps (extract_qmgr/node_dump.yml)" /etc/cron.d/mqace-dumps "${dlog:-/opt/apps/mqaceserver/resources/qmgr_dump.csv}"
      register: ctl_crons
      changed_when: false
      failed_when: false

    - name: Record control-node facts for the dashboard
      ansible.builtin.set_fact:
        ctl_hostname: "{{ ansible_hostname | default('control') }}"
        ctl_public_ip: "{{ ctl_pubip.stdout | default('') | trim }}"
        ctl_private_ip: "{{ ansible_default_ipv4.address | default('') }}"
        ctl_os: "{{ ansible_distribution | default('') }} {{ ansible_distribution_version | default('') }}"
        ctl_ansible_ver: "{{ ctl_ansible.stdout | default('') | trim }}"
        ctl_playbook_dir: "{{ playbook_dir }}"
        ctl_cron_lines: "{{ ctl_crons.stdout_lines | default([]) }}"

    - name: Ensure dashboard directory exists
      ansible.builtin.file:
        path: "{{ dashboard_dir }}"
        state: directory
        mode: "0755"

    - name: Publish the latest config-dump CSVs into the web dir (for download)
      ansible.builtin.shell: |
        src=/opt/apps/mqaceserver/resources
        for f in qmgr_dump.csv node_dump.csv node_config.csv; do
          if [ -f "$src/$f" ]; then
            install -m 0644 "$src/$f" "{{ dashboard_dir }}/$f"
            sz=$(du -h "$src/$f" | cut -f1)
            ts=$(date -r "$src/$f" '+%Y-%m-%d %H:%M:%S %Z')
            echo "$f|$sz|$ts"
          fi
        done
      register: ctl_csvs
      changed_when: false
      failed_when: false

    - name: Record published CSV list
      ansible.builtin.set_fact:
        ctl_csv_files: "{{ ctl_csvs.stdout_lines | default([]) }}"

    - name: Probe the MQ+ACE MCP stack endpoints (health checks, localhost)
      ansible.builtin.shell: |
        repo=/opt/apps/mqaceserver/mqacemcp
        geten() { f="$1"; k="$2"; d="$3"; v=""; [ -f "$f" ] && v=$(grep -E "^[[:space:]]*$k[[:space:]]*=" "$f" | head -1 | sed -E "s/^[[:space:]]*$k[[:space:]]*=[[:space:]]*//" | tr -d "\r"); [ -n "$v" ] && echo "$v" || echo "$d"; }
        # MCP server: TLS cert + port live in mqacemcpserver-single/.env (not repo root).
        if [ -n "$(geten $repo/mqacemcpserver-single/.env MCP_TLS_CERT '')" ]; then mcp_sch=https; else mcp_sch=http; fi
        mcp_port=$(geten $repo/mqacemcpserver-single/.env MCP_PORT 8001)
        bk_port=$(geten $repo/backend/.env CHAT_PORT 8002)
        # Dashboard binds MCP_DASHBOARD_PORT (default 8004) over plain HTTP — it
        # reads only the process env, so dashboard/.env mirrors the systemd value.
        dash_port=$(geten $repo/dashboard/.env MCP_DASHBOARD_PORT 8004)
        fe_port=8003
        emit() {  # name|scheme|port|display_path  (probes health_path)
          name="$1"; s="$2"; port="$3"; hpath="$4"; dpath="$5"
          code=$(curl -sk -o /dev/null -m 4 -w "%{http_code}" "$s://localhost:$port$hpath" 2>/dev/null)
          [ "$code" = "200" ] && st=UP || st=DOWN
          echo "$name|$s|$port|$dpath|$st|$code"
        }
        emit "MCP server (SSE)"   "$mcp_sch" "$mcp_port"  "/healthz"        "/sse"
        emit "Chat backend (API)" "http"     "$bk_port"   "/api/health"     "/api/health"
        emit "Streamlit chat UI"  "http"     "$fe_port"   "/_stcore/health" "/"
        emit "Log dashboard"      "http"     "$dash_port" "/healthz"        "/dashboard"
      register: mcp_eps
      changed_when: false
      failed_when: false

    - name: Record MCP stack endpoint statuses
      ansible.builtin.set_fact:
        mqacemcp_endpoints: "{{ mcp_eps.stdout_lines | default([]) }}"

    - name: Probe the secure gateway (Caddy) listeners
      ansible.builtin.shell: |
        emit() {  # name|port|path -> name|port|path|status|code  (Caddy returns 401 when UP = auth challenge)
          name="$1"; port="$2"; path="$3"
          code=$(curl -sk -o /dev/null -m 4 -w "%{http_code}" "https://localhost:$port$path" 2>/dev/null)
          case "$code" in 200|401) st=UP;; *) st=DOWN;; esac
          echo "$name|$port|$path|$st|$code"
        }
        emit "Dashboard (secure)"     443  "/"
        emit "Chat UI (secure)"       8444 "/"
        emit "Log dashboard (secure)" 8445 "/dashboard"
      register: gw_eps
      changed_when: false
      failed_when: false

    - name: Record secure-gateway endpoint statuses
      ansible.builtin.set_fact:
        gateway_endpoints: "{{ gw_eps.stdout_lines | default([]) }}"

    - name: Render the status dashboard
      ansible.builtin.template:
        src: validate_dashboard.html.j2
        dest: "{{ dashboard_dir }}/index.html"
        mode: "0644"

    - name: Dashboard written
      ansible.builtin.debug:
        msg: "Dashboard updated at {{ dashboard_dir }}/index.html — served on :8090 by validate-dashboard.service ({{ ansible_date_time.iso8601 }})"
