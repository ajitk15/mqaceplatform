---
###############################################################################
# install_ace.yml — install IBM ACE 13 (Evaluation) and create an integration
# node, mirroring the manual steps:
#
#   groupadd mqbrkrs
#   usermod -aG mqbrkrs mqm                 (mqm already exists from MQ)
#   mkdir -p /opt/ibm ; chmod -R ug=rwx,o=rx /opt/ibm
#   cd /opt/ibm ; tar -xvzf /tmp/13.0.7.0-ACE-LINUX64-EVALUATION.tar.gz   (from S3)
#   cd /opt/ibm/ace-13.0.7.0 ; ./ace make registry global accept license silently
#   chmod -R ug=rwx,o=rx /opt/ibm/ace-13.0.7.0
#   mqm .bash_profile:  . /opt/ibm/ace-13.0.7.0/server/bin/mqsiprofile
#
# Then creates an associated queue manager (NODE1 -> MQNODE1, NODE2 -> MQNODE2),
# creates the integration node bound to it (mqsicreatebroker -q), sets its web
# admin port, starts it, and enables both on boot.
#
#   ansible-playbook -i /etc/ansible/hosts install_ace.yml
###############################################################################

- name: Install IBM ACE 13 and create the integration node
  hosts: mq_ace
  become: true
  gather_facts: true
  vars_files:
    - mq_ace_install_vars.yml
  vars:
    ace_archive: "{{ ace_s3_key }}"
    ace_home: "{{ ace_install_parent }}/ace-{{ ace_version }}"
    mqsiprofile: "{{ ace_install_parent }}/ace-{{ ace_version }}/server/bin/mqsiprofile"
    node_name: "{{ ace_node_map[inventory_hostname] }}"
    node_qmgr: "{{ ace_node_qmgr_map[inventory_hostname] }}"
    node_qmgr_port: "{{ ace_node_qmgr_port_map[inventory_hostname] }}"

  tasks:
    # --- 0. Swap (free-tier RAM) --------------------------------------------
    - name: Configure swap if low on RAM
      when: configure_swap | bool and ansible_memtotal_mb | int < 2048
      block:
        - name: Allocate swapfile
          ansible.builtin.command: "fallocate -l {{ swap_size_mb }}M /swapfile"
          args: { creates: /swapfile }
        - name: Secure + enable swap
          ansible.builtin.shell: |
            set -e
            chmod 600 /swapfile
            if ! swapon --show | grep -q '/swapfile'; then
              mkswap /swapfile; swapon /swapfile
              grep -q '/swapfile' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
            fi
          changed_when: false

    # --- 1. Users / groups / dirs (== groupadd / usermod / mkdir / chmod) ---
    - name: Ensure mqbrkrs group exists
      ansible.builtin.group:
        name: "{{ ace_group }}"
        state: present

    - name: Ensure mqm is in mqbrkrs
      ansible.builtin.user:
        name: "{{ ace_user }}"
        groups: "{{ ace_group }}"
        append: true

    - name: Create /opt/ibm
      ansible.builtin.file:
        path: "{{ ace_install_parent }}"
        state: directory
        mode: "0775"

    # --- 2. Fetch installer from S3 (control node) and copy to target -------
    - name: Download ACE installer from S3 to the control node (once)
      delegate_to: localhost
      run_once: true
      become: false
      ansible.builtin.command: "aws s3 cp s3://{{ s3_bucket }}/{{ ace_archive }} /tmp/{{ ace_archive }}"
      args:
        creates: "/tmp/{{ ace_archive }}"

    - name: Copy ACE installer to the target /tmp
      ansible.builtin.copy:
        src: "/tmp/{{ ace_archive }}"
        dest: "/tmp/{{ ace_archive }}"
        mode: "0644"

    # --- 3. Extract + license + perms (== tar / ace make registry / chmod) --
    - name: Extract ACE into /opt/ibm
      ansible.builtin.unarchive:
        src: "/tmp/{{ ace_archive }}"
        dest: "{{ ace_install_parent }}"
        remote_src: true
        creates: "{{ mqsiprofile }}"

    - name: Accept the ACE license (registry global, silent)
      ansible.builtin.command: "./ace make registry global accept license silently"
      args:
        chdir: "{{ ace_home }}"
      register: ace_license
      changed_when: ace_license.rc == 0
      failed_when: ace_license.rc != 0 and 'already' not in (ace_license.stdout | lower)

    - name: Set permissions on the ACE install
      ansible.builtin.command: "chmod -R ug=rwx,o=rx {{ ace_home }}"
      changed_when: false

    - name: Add mqsiprofile to mqm's .bash_profile
      ansible.builtin.lineinfile:
        path: "/home/{{ ace_user }}/.bash_profile"
        line: ". {{ mqsiprofile }}"
        create: true
        owner: "{{ ace_user }}"
        group: "{{ ace_user }}"
        mode: "0644"

    # --- 4. Integration node creation (NODE1 / NODE2) -----------------------
    - name: Ensure ACE work path exists (owned by mqm)
      ansible.builtin.file:
        path: /var/mqsi
        state: directory
        owner: "{{ ace_user }}"
        group: "{{ ace_group }}"
        mode: "0775"

    # --- 4a. Associated queue manager (NODE1 -> MQNODE1, NODE2 -> MQNODE2) ---
    - name: Check whether the associated queue manager {{ node_qmgr }} exists
      ansible.builtin.command: "{{ mq_install_dir }}/bin/dspmq -m {{ node_qmgr }}"
      become_user: "{{ ace_user }}"
      register: dspmq_node
      changed_when: false
      failed_when: false

    - name: Create the associated queue manager {{ node_qmgr }}
      ansible.builtin.command: "{{ mq_install_dir }}/bin/crtmqm {{ node_qmgr }}"
      become_user: "{{ ace_user }}"
      when: "node_qmgr not in dspmq_node.stdout"

    - name: Start the associated queue manager {{ node_qmgr }}
      ansible.builtin.command: "{{ mq_install_dir }}/bin/strmqm {{ node_qmgr }}"
      become_user: "{{ ace_user }}"
      register: strmqm_node
      changed_when: "'already running' not in (strmqm_node.stdout | lower)"
      failed_when: strmqm_node.rc not in [0, 5]    # rc 5 = already running

    - name: Create systemd unit for the associated queue manager
      ansible.builtin.copy:
        dest: "/etc/systemd/system/mq-{{ node_qmgr }}.service"
        mode: "0644"
        content: |
          [Unit]
          Description=IBM MQ Queue Manager {{ node_qmgr }} (ACE node {{ node_name }})
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=forking
          User={{ ace_user }}
          ExecStart={{ mq_install_dir }}/bin/strmqm {{ node_qmgr }}
          ExecStop={{ mq_install_dir }}/bin/endmqm -w {{ node_qmgr }}
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Enable the associated queue manager on boot
      ansible.builtin.systemd:
        name: "mq-{{ node_qmgr }}"
        enabled: true
        daemon_reload: true

    # Cluster channel CONNAMEs reference server1/2/3 by name; make sure they
    # resolve. setup_mq_components.yml manages the same block (identical marker),
    # so this is a no-op when run via install_platform.yml.
    - name: Ensure cluster member names resolve in /etc/hosts
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED — ACECLUSTER members"
        block: |
          {% for h in groups['all_mq_servers'] %}
          {{ hostvars[h].ansible_host | default(h) }} {{ h }}
          {% endfor %}

    - name: Render {{ node_qmgr }} cluster + queue MQSC
      ansible.builtin.copy:
        dest: "/tmp/{{ node_qmgr }}-config.mqsc"
        owner: "{{ ace_user }}"
        group: "{{ ace_group }}"
        mode: "0644"
        content: |
          DEFINE LISTENER(TCP.LSTR) TRPTYPE(TCP) PORT({{ node_qmgr_port }}) CONTROL(QMGR) REPLACE
          START LISTENER(TCP.LSTR)
          DEFINE CHANNEL({{ node_qmgr }}.CLUSRCVR) CHLTYPE(CLUSRCVR) TRPTYPE(TCP) CONNAME('{{ inventory_hostname }}({{ node_qmgr_port }})') CLUSTER({{ ace_cluster_name }}) REPLACE
          DEFINE CHANNEL({{ node_qmgr }}.CLUSSDR) CHLTYPE(CLUSSDR) TRPTYPE(TCP) CONNAME('{{ ace_cluster_repo_conname }}') CLUSTER({{ ace_cluster_name }}) REPLACE
          DEFINE QLOCAL('QL.INPUT') REPLACE
          DEFINE QLOCAL('QL.INPUT.LFT') REPLACE
          DEFINE QLOCAL('QL.LOCAL') REPLACE
          DEFINE QLOCAL('QL.OUT') REPLACE
          DEFINE QLOCAL('QL.OUT.SPLIT') REPLACE
          DEFINE QLOCAL('QL.OUT1') REPLACE
          DEFINE QLOCAL('QL.OUT2') REPLACE
          DEFINE QLOCAL('QL.SOURCE') REPLACE
          DEFINE QLOCAL('QL.TARGET.LAPTOP') REPLACE
          DEFINE QLOCAL('QL.TARGET.MONITOR') REPLACE
          DEFINE QLOCAL('QL.TARGET.MOUSE') REPLACE
          DEFINE QLOCAL('QL.TARGET.SPLIT') REPLACE
          DEFINE QLOCAL('QL.TARGET.SPLIT_IN') REPLACE
          DEFINE QLOCAL('QL.TARGET.SPLIT_OUT') REPLACE

    - name: Apply {{ node_qmgr }} cluster + queue MQSC (join {{ ace_cluster_name }})
      ansible.builtin.shell: "{{ mq_install_dir }}/bin/runmqsc {{ node_qmgr }} < /tmp/{{ node_qmgr }}-config.mqsc"
      become_user: "{{ ace_user }}"
      register: runmqsc_node
      changed_when: true
      failed_when: runmqsc_node.rc != 0

    # --- 4b. Integration node, associated with {{ node_qmgr }} --------------
    - name: Create integration node {{ node_name }} (associated with {{ node_qmgr }})
      ansible.builtin.shell: "source {{ mqsiprofile }} && mqsicreatebroker {{ node_name }} -q {{ node_qmgr }}"
      args:
        executable: /bin/bash
        creates: "/var/mqsi/components/{{ node_name }}"
      become_user: "{{ ace_user }}"

    - name: Set the integration node web admin port to {{ ace_web_port }}
      ansible.builtin.shell: "source {{ mqsiprofile }} && mqsichangeproperties {{ node_name }} -b webadmin -o HTTPConnector -n port -v {{ ace_web_port }}"
      args:
        executable: /bin/bash
      become_user: "{{ ace_user }}"
      changed_when: true

    - name: Systemd unit for the integration node
      ansible.builtin.copy:
        dest: "/etc/systemd/system/ace-{{ node_name }}.service"
        mode: "0644"
        content: |
          [Unit]
          Description=IBM ACE Integration Node {{ node_name }}
          After=network-online.target mq-{{ node_qmgr }}.service
          Wants=network-online.target mq-{{ node_qmgr }}.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          TimeoutStartSec=300
          User={{ ace_user }}
          # Non-login shell: source mqsiprofile exactly once (ACE forbids re-sourcing)
          ExecStart=/bin/bash -c 'source {{ mqsiprofile }} && mqsistart {{ node_name }}'
          ExecStop=/bin/bash -c 'source {{ mqsiprofile }} && mqsistop {{ node_name }}'

          [Install]
          WantedBy=multi-user.target

    - name: Enable + start the integration node
      ansible.builtin.systemd:
        name: "ace-{{ node_name }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Open ACE web admin port in firewalld
      ansible.builtin.shell: |
        systemctl enable --now firewalld
        firewall-cmd --permanent --add-port={{ ace_web_port }}/tcp
        firewall-cmd --reload
      register: ace_fw
      changed_when: "'Warning: ALREADY_ENABLED' not in ace_fw.stderr"

    - name: Report
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} → ACE {{ ace_version }} node {{ node_name }} (queue manager {{ node_qmgr }}), web admin on {{ ace_web_port }}"
