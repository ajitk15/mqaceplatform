---
###############################################################################
# configure_mq.yml — start the MQ Console (mqweb) on every MQ server
#
# Run AFTER install_mq.yml and setup_mq_components.yml. The queue managers
# (including the developer MQQM1, folded into scripts/mqsetup/server1_full_setup.mqsc)
# are created by setup_mq_components.yml; this playbook only brings up the
# MQ Console / REST API (mqweb).
#
#   ansible-playbook -i /etc/ansible/hosts configure_mq.yml
###############################################################################

- name: Enable the MQ Web Console (mqweb) on every MQ server
  hosts: all_mq_servers      # MQ Console must come up on server1, server2 and server3
  become: true
  gather_facts: false
  vars_files:
    - mq_ace_install_vars.yml

  tasks:
    # --- MQ Console / REST API (mqweb) --------------------------------------
    - name: Locate the mqweb server config directory
      ansible.builtin.shell: |
        set -o pipefail
        find /var/mqm/web/installations -maxdepth 3 -type d -name mqweb | head -1
      args:
        executable: /bin/bash
      register: mqweb_dir
      changed_when: false

    - name: Fail if mqweb is not installed
      ansible.builtin.assert:
        that: mqweb_dir.stdout | length > 0
        fail_msg: "mqweb dir not found — is the MQSeriesWeb RPM installed?"

    - name: Write mqwebuser.xml (single admin user, remote access enabled)
      ansible.builtin.copy:
        dest: "{{ mqweb_dir.stdout }}/mqwebuser.xml"
        owner: mqm
        group: mqm
        mode: "0640"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <server>
            <featureManager>
              <feature>appSecurity-2.0</feature>
              <feature>basicAuthenticationMQ-1.0</feature>
            </featureManager>

          <enterpriseApplication id="com.ibm.mq.console">
              <application-bnd>
                  <security-role name="MQWebAdmin">
                      <group name="MQWebAdminGroup" realm="defaultRealm"/>
                  </security-role>
                  <security-role name="MQWebAdminRO">
                      <user name="mqreader" realm="defaultRealm"/>
                  </security-role>
                  <security-role name="MQWebUser">
                      <special-subject type="ALL_AUTHENTICATED_USERS"/>
                  </security-role>
                  <security-role name="MFTWebAdmin">
                      <user name="mftadmin" realm="defaultRealm"/>
                  </security-role>
                  <security-role name="MFTWebAdminRO">
                      <user name="mftreader" realm="defaultRealm"/>
                  </security-role>
              </application-bnd>
          </enterpriseApplication>

            <enterpriseApplication id="com.ibm.mq.rest">
                <application-bnd>
                    <security-role name="MQWebAdmin">
                        <group name="MQWebAdminGroup" realm="defaultRealm"/>
                    </security-role>
                    <security-role name="MQWebAdminRO">
                        <user name="mqreader" realm="defaultRealm"/>
                    </security-role>
                    <security-role name="MQWebUser">
                        <special-subject type="ALL_AUTHENTICATED_USERS"/>
                    </security-role>
                    <security-role name="MFTWebAdmin">
                        <user name="mftadmin" realm="defaultRealm"/>
                    </security-role>
                    <security-role name="MFTWebAdminRO">
                        <user name="mftreader" realm="defaultRealm"/>
                    </security-role>
                </application-bnd>
            </enterpriseApplication>
          
          <basicRegistry id="basic" realm="defaultRealm">
                <user name="mqadmin" password="{{ mq_admin_password }}"/>
                <user name="mqreader" password="{{ mq_reader_password }}"/>
                <user name="mftadmin" password="{{ mft_admin_password }}"/>
                <user name="mftreader" password="{{ mft_reader_password }}"/>
                <group name="MQWebAdminGroup">
                  <member name="mqadmin"/>
                </group>
            </basicRegistry>

            <variable name="httpHost" value="*"/>
          </server>
      register: mqwebuser

    - name: Check whether mqweb is running
      ansible.builtin.command: "{{ mq_install_dir }}/bin/dspmqweb status"
      become_user: mqm
      register: dspmqweb
      changed_when: false
      failed_when: false

    - name: Start mqweb if not running
      ansible.builtin.command: "{{ mq_install_dir }}/bin/strmqweb"
      become_user: mqm
      when: "'Running' not in dspmqweb.stdout"
      register: strmqweb
      changed_when: strmqweb.rc == 0
      failed_when: strmqweb.rc != 0 and 'already running' not in (strmqweb.stdout | lower)

    - name: Restart mqweb if its config changed
      ansible.builtin.shell: "{{ mq_install_dir }}/bin/endmqweb; {{ mq_install_dir }}/bin/strmqweb"
      become_user: mqm
      when: mqwebuser is changed and "'Running' in dspmqweb.stdout"
      changed_when: true

    - name: Create systemd unit so mqweb starts on boot
      ansible.builtin.copy:
        dest: /etc/systemd/system/mqweb.service
        mode: "0644"
        content: |
          [Unit]
          Description=IBM MQ Web Server (Console + REST API)
          After=network-online.target mq-{{ mq_queue_manager }}.service
          Wants=network-online.target

          [Service]
          Type=forking
          User=mqm
          ExecStart={{ mq_install_dir }}/bin/strmqweb
          ExecStop={{ mq_install_dir }}/bin/endmqweb
          Restart=on-failure
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    - name: Enable mqweb service on boot
      ansible.builtin.systemd:
        name: mqweb
        enabled: true
        daemon_reload: true

    - name: Ensure the MQ Console port is open in firewalld
      ansible.builtin.shell: |
        systemctl enable --now firewalld
        firewall-cmd --permanent --add-port=9443/tcp
        firewall-cmd --reload
      register: mqweb_fw
      changed_when: "'ALREADY_ENABLED' not in mqweb_fw.stderr"

    - name: Wait for the MQ Console HTTPS port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 9443
        timeout: 90
        state: started

    - name: Show MQ Console URL + login
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} → https://{{ ansible_host | default(inventory_hostname) }}:9443/ibmmq/console/
          (login: {{ mq_admin_user }} / {{ mq_dev_password }})
