---
###############################################################################
# install_platform.yml — top-level orchestration
#
# Installs IBM MQ on all MQ servers, then ACE on the MQ+ACE servers.
# Edit mq_ace_install_vars.yml first (binary source, versions, S3 keys).
#
# Run from the Ansible Control Node:
#   cd /etc/ansible/playbooks
#   ansible-playbook install_platform.yml
###############################################################################

- import_playbook: install_mq.yml           # install MQ (mirrors the manual RPM install)
- import_playbook: setup_mq_components.yml  # create per-server QMs (incl. dev MQQM1) + ACECLUSTER from scripts/mqsetup
- import_playbook: configure_mq.yml         # start MQ Console (mqweb) on every MQ server
- import_playbook: install_ace.yml          # install ACE on the MQ+ACE servers
- import_playbook: schedule_dumps.yml       # control node: every-30-min qmgr/node config dumps cron (before optional demo BARs so it always installs)
- import_playbook: setup_mqacemcp.yml       # control node: clone MQ+ACE MCP stack, build per-component Python 3.13 venvs, run via systemd (does not touch Ansible's 3.9)
- import_playbook: setup_gateway.yml        # control node: Caddy secure gateway (:443, HTTPS + Basic Auth) fronting the dashboard
- import_playbook: setup_ace_components.yml # create integration servers + deploy demo BARs (best-effort; may time out on t3.micro)
